name: Build and Push Log Collector Image

on:
  push:
    tags:
      - "collector-v*.*.*"  # 匹配 collector-v1.0.0 格式
    paths:
      - "log-collector/**"  # 只有 log-collector 目录变更时触发
  workflow_dispatch:
    inputs:
      version:
        description: "Version of the collector (optional, without leading v)"
        required: false
        type: string

jobs:
  build-and-push-collector:
    runs-on: ubuntu-latest
    env:
      IMAGE_REGISTRY_SERVICE: ${{ vars.IMAGE_REGISTRY || 'opensource-registry.cn-hangzhou.cr.aliyuncs.com' }}
      IMAGE_REPOSITORY: ${{ vars.COLLECTOR_IMAGE_REPOSITORY || 'higress-group' }}
      COLLECTOR_NAME: log-collector
    steps:
      - name: Set version
        id: set_vars
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            ref_name=${{ github.ref_name }}
            # 从 collector-v1.2.3 提取 1.2.3
            version=$(echo "$ref_name" | sed 's/^collector-v//')
          fi
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.IMAGE_REGISTRY_SERVICE }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: ./log-collector
          file: ./log-collector/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY_SERVICE }}/${{ env.IMAGE_REPOSITORY }}/${{ env.COLLECTOR_NAME }}:${{ env.VERSION }}
            ${{ env.IMAGE_REGISTRY_SERVICE }}/${{ env.IMAGE_REPOSITORY }}/${{ env.COLLECTOR_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
